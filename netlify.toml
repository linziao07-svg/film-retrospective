[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/discover"
  to = "/.netlify/functions/discover"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
